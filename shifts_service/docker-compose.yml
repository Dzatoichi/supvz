services:
  postgres:
    image: postgres:17
    container_name: shifts_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=shifts_db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  shifts_service:
    build: .
    container_name: shifts_service
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shifts_service

  postgres_test:
    image: postgres:17
    container_name: shifts_postgres_test
    profiles: [ "test" ]
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_shifts_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    restart: no
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test_user -d test_shifts_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  logs:
  nginx: