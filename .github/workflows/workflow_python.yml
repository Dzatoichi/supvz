name: CI_PYTHON

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]
jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ auth_service, pvz_service ]
    env:
      SERVICE_DIR: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@v2
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          sudo curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --no-root
      - name: Lint with ruff
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          poetry run ruff check .
          poetry run ruff format --check --diff

  test:
    name: Tests (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ auth_service, pvz_service ]
    env:
      SERVICE_DIR: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          sudo curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
          poetry install --no-root
      - name: Create .env.test
        if: matrix.service == 'pvz_service'
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          echo "DB_HOST=localhost" > .env.test
          echo "DB_PORT=5433" >> .env.test
          echo "DB_USER=test_user" >> .env.test
          echo "DB_PASS=test_pass" >> .env.test
          echo "DB_NAME=test_pvz_db" >> .env.test
      - name: Run tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          if [ "${{ matrix.service }}" == "pvz_service" ]; then
             poetry run python src/tests/run_tests.py
          else
             poetry run pytest
          fi