# noinspection undefined
app:
  notification:
    number-retry-attempts: 3
  websocket:
    base-topic: topic
    allowed-origins:
      - "*"
  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
  messaging:
    inbox-queue: ${MESSAGING_INBOX_QUEUE}
  inbox:
    reservation-min: ${INBOX_RESERVATION_IN_MINUTES}
    polling:
      cleaning:
        batch-size: 10
        delay-ms: 100000
      processing:
        batch-size: 10
        delay-ms: 10000