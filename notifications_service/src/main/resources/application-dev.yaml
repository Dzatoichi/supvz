spring:
  docker:
    compose:
      enabled: true
      file:
        - docker_build/dev/docker-compose.yaml
  jpa:
    show-sql: true
  mail:
    host: smtp.gmail.com
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

logging:
  level:
    com.supvz.notifications_service: trace

messaging:
  notifications_queue: notifications_queue

inbox:
  reservation_in_minutes: 5
  polling:
    to_process_by_time:
      number: 10