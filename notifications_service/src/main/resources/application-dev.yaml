spring:
  docker:
    compose:
      enabled: true
      file:
        - docker_build/dev/docker-compose.yaml
  jpa:
    show-sql: true
  mail:
    host: smtp.gmail.com
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
  datasource:
    username: developer
    password: developer
    url: jdbc:postgresql://localhost:5432/notifications_db

logging:
  level:
    com.supvz.notifications_service: trace

app:
  notification:
    number-retry-attempts: 3
  websocket:
    base-topic: topic
    allowed-origins:
      - "*"
  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
  messaging:
    notifications_queue: notifications_queue
  inbox:
    reservation-min: 5
    polling:
      delay-ms: 10000
      batch-size: 10