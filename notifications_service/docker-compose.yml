services:
  notifications-service:
    build:
      dockerfile: Dockerfile
      context: .
    container_name: notifications-service
    volumes:
      - app_logs:/app/logs
    restart: always
    expose:
      - "8003"
    env_file:
      - .env
    environment:
#      SERVER_PORT: ${SERVER_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      notifications-psql:
        condition: service_healthy
      message-broker:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - notifications-net

  notifications-psql:
    image: postgres:17-alpine
    container_name: notifications-psql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - notifications-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  message-broker:
    image: rabbitmq:4-management-alpine
    container_name: message-broker
    volumes:
      - ./infrastructure/message_broker/definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_DEFAULT_USER: ${MB_USER}
      RABBITMQ_DEFAULT_PASS: ${MB_PASS}
      RABBITMQ_DEFAULT_VHOST: ${MB_VHOST}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions '/etc/rabbitmq/definitions.json' -rabbitmq-plugins enable rabbitmq_prometheus"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    networks:
      - notifications-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # ________OBSERVABILITY__________________
  grafana: # визуализация, дашборды
    image: grafana/grafana:latest
    profiles:
      - observability
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_SECURITY_ADMIN_USER: ${GF_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASS}
      GF_METRICS_ENABLED: "true"
    ports:
      - "3000:3000"
    networks:
      - notifications-net
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
      prometheus:
        condition: service_healthy

  prometheus: # сбор и хранение метрик
    image: prom/prometheus:latest
    profiles:
      - observability
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - notifications-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5

  loki: # сбор и хранение логов
    image: grafana/loki:2.9.2
    profiles:
      - observability
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yaml:ro
      - loki_chunks:/loki/chunks
      - loki_index:/loki/index
      - loki_rules:/loki/rules
    container_name: loki
    user: root
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    networks:
      - notifications-net
    depends_on:
      promtail:
        condition: service_started

  promtail: # парсит логи и отправляет в локи
    image: grafana/promtail:3.6.3
    profiles:
      - observability
    volumes:
      - app_logs:/var/log/app-logs:ro
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - notifications-net

  tempo: # сбор хранение трейсов
    image: grafana/tempo:2.9.0
    profiles:
      - observability
    volumes:
      - ./infrastructure/tempo/tempo.yml:/etc/tempo/tempo.yml
      - tempo_data:/var/tempo
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    ports:
#      - "3200:3200"  # UI порт
      - "4317:4317"  # OTLP gRPC
#      - "4318:4318"  # OTLP HTTP
    networks:
      - notifications-net

#  collector: # коллектор для получения трейсов otel, отправляет в темпо
#    image: otel/opentelemetry-collector-contrib:latest
#    profiles:
#      - observability
#    volumes:
#      - ./infrastructure/collector/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml
#    container_name: collector
#    command:
#      - --config=/etc/otelcol-contrib/otel-collector.yml
#    restart: always
#    ports:
#      - "4317:4317"  # OTLP gRPC
#      - "4319:4319"
#    networks:
#      - notifications-net
#    depends_on:
#      - tempo

  notifications-psql-exporter: # агент для сбора метрик у БД
    image: prometheuscommunity/postgres-exporter:latest
    profiles:
      - observability
    container_name: notifications-psql-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASS}@notifications-psql:${DB_PORT}/${DB_NAME}?sslmode=disable
    networks:
      - notifications-net
    depends_on:
      notifications-psql:
        condition: service_healthy

  # ____________UTIL____________
  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    networks:
      - notifications-net
    depends_on:
      notifications-service:
        condition: service_healthy

volumes:
  app_logs:
  loki_chunks:
  loki_index:
  loki_rules:
  tempo_data:

networks:
  notifications-net:
    driver: bridge