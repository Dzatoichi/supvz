services:
  postgres:
    image: postgres:17-alpine
    container_name: req_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  message_broker:
    container_name: message_broker
    image: rabbitmq:4-management-alpine
    volumes:
      - ./docker_build/message_broker/init/rabbitmq_definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_DEFAULT_USER: ${MB_USER}
      RABBITMQ_DEFAULT_PASS: ${MB_PASS}
      RABBITMQ_DEFAULT_VHOST: ${MB_VHOST}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions '/etc/rabbitmq/definitions.json'"
    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker_build/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  notifications-service:
    build:
      dockerfile: Dockerfile
      context: .
    container_name: notifications_service
    restart: always
    expose:
      - "8003"
    env_file:
      - docker_build/.env
    environment:
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      message_broker:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker_build/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      notifications-service:
        condition: service_healthy