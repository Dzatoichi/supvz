services:
  postgres:
    image: postgres:17-alpine
    container_name: notifications_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  message-broker:
    container_name: message_broker
    image: rabbitmq:4-management-alpine
    volumes:
      - ./docker_build/message_broker/init/rabbitmq_definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_DEFAULT_USER: ${MB_USER}
      RABBITMQ_DEFAULT_PASS: ${MB_PASS}
      RABBITMQ_DEFAULT_VHOST: ${MB_VHOST}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions '/etc/rabbitmq/definitions.json' -rabbitmq-plugins enable rabbitmq_prometheus"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notifications-service:
    build:
      dockerfile: Dockerfile
      context: .
    container_name: notifications_service
    restart: always
    expose:
      - "8003"
    env_file:
      - docker_build/.env
    environment:
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      message-broker:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30


# ________OBSERVABILITY__________________
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker_build/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    user: root
    volumes:
      - ./docker_build/loki/loki-config.yml:/etc/loki/loki-config.yaml:ro
      - loki_chunks:/loki/chunks
      - loki_index:/loki/index
      - loki_rules:/loki/rules
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    environment:
      GRAFANA_LOKI_URL: ${LOKI_URL}
    volumes:
      - ./docker_build/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:9080
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "9080:9080"

  notifications-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: notifications_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASS}@postgres:${DB_PORT}/${DB_NAME}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_SECURITY_ADMIN_USER: ${GF_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASS}
      GF_METRICS_ENABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy

# ____________UTIL____________
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker_build/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      notifications-service:
        condition: service_healthy

volumes:
  loki_chunks:
  loki_index:
  loki_rules: