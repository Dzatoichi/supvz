global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: notifications_service
    metrics_path: /actuator/prometheus
    static_configs:
      - labels: {}
      - targets: ["host.docker.internal:8003"]
