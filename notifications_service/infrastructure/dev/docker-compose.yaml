services:
  dev-psql:
    image: postgres:17-alpine
    container_name: dev-psql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_db
    ports:
      - "5432:5432"
  dev-psql-exporter: # агент для сбора метрик у БД
    image: prometheuscommunity/postgres-exporter:latest
    container_name: dev-psql-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@dev-psql:5432/notifications_db?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      dev-psql:
        condition: service_started

  dev-mb:
    image: rabbitmq:4-management-alpine
    container_name: dev-mb
    volumes:
      - ./message_broker/definitions.json:/etc/rabbitmq/definitions.json
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions '/etc/rabbitmq/definitions.json'"
    ports:
      - "5672:5672"
      - "15672:15672"

  dev-prometheus:
    image: prom/prometheus:latest
    container_name: dev-prometheus
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
