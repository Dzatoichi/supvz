[project]
name = "auth-service"
version = "0.1.0"
description = ""
authors = [
    {name = "Egor Alexandrov",email = "dibilarts@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi (>=0.116.1,<0.117.0)",
    "ruff (>=0.12.9,<0.13.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 120
select = ["E", "F", "W", "I", "B", "C4"]
ignore = ["E501", "W503"]
target-version = "py311"