services:
  requests-psql:
    image: postgres:17-alpine
    container_name: requests-psql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 20

  requests-service:
    build:
      dockerfile: Dockerfile
    container_name: requests-service
    restart: always
    expose:
      - "8002"
    env_file:
      - docker_build/.env
    depends_on:
      requests-psql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -f http://localhost:8002/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker_build/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      requests-service:
        condition: service_healthy